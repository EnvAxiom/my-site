<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dilsher</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --green-dim: rgba(0,255,136,0.15);
    --green-glow: rgba(0,255,136,0.4);
    --card-bg: rgba(10,10,10,0.72);
    --card-border: rgba(255,255,255,0.07);
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: rgba(255,255,255,0.45);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: var(--font-body);
    color: var(--text);
    background: #000;
    overflow: hidden;
  }

  /* ── BG VIDEO ── */
  video.bg {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    filter: blur(18px) brightness(0.35) saturate(1.4);
    transform: scale(1.05);
  }

  .bg-overlay {
    position: fixed; inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 100% 100%, rgba(0,100,255,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .page {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 16px 120px;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    backdrop-filter: blur(32px) saturate(1.8);
    -webkit-backdrop-filter: blur(32px) saturate(1.8);
    padding: 28px 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── AVATAR ── */
  .avatar-wrap {
    position: relative;
    width: 96px; height: 96px;
    margin-bottom: 14px;
  }

  .avatar-ring {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(
      var(--green) 0deg,
      rgba(0,255,136,0.4) 120deg,
      transparent 200deg,
      var(--green) 360deg
    );
    animation: spin 4s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-ring-bg {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: #000;
    inset: -2px;
  }

  .avatar {
    position: relative;
    width: 96px; height: 96px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #000;
    z-index: 2;
  }

  .status-dot {
    position: absolute;
    bottom: 4px; right: 4px;
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid #000;
    z-index: 3;
    background: #888;
    transition: background 0.3s;
  }

  /* ── NAME ── */
  .name {
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(90deg, #fff 0%, var(--green) 50%, #fff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 4s linear infinite;
    margin-bottom: 4px;
  }

  @keyframes shine {
    to { background-position: 200% center; }
  }

  .subuser {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 18px;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
  }

  /* ── DISCORD BOX ── */
  .discord-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    transition: background 0.2s;
  }

  .discord-box:hover { background: var(--surface-hover); }

  .dc-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .dc-info { flex: 1; min-width: 0; text-align: left; }
  .dc-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dc-status { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .dc-icon {
    width: 18px; height: 18px; flex-shrink: 0;
    opacity: 0.5;
  }

  /* ── LINKS ── */
  .links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .link-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: background 0.18s, transform 0.18s, border-color 0.18s;
    cursor: pointer;
  }

  .link-btn:hover {
    background: var(--surface-hover);
    border-color: rgba(0,255,136,0.3);
    transform: translateY(-3px) scale(1.08);
  }

  .link-btn img {
    width: 20px; height: 20px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.8;
  }

  /* ── PLAYER ── */
  .player {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    width: calc(100% - 32px);
    max-width: 440px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    backdrop-filter: blur(32px) saturate(1.8);
    -webkit-backdrop-filter: blur(32px) saturate(1.8);
    padding: 14px 18px 12px;
    animation: fadeUp 0.8s 0.2s cubic-bezier(.16,1,.3,1) both;
  }

  .player-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .album-art {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .album-art img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 9px;
  }

  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-time  { font-size: 11px; color: var(--muted); }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .ctrl-btn {
    background: none; border: none; color: var(--text);
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s, transform 0.12s;
    flex-shrink: 0;
  }

  .ctrl-btn:hover { background: var(--surface-hover); }
  .ctrl-btn:active { transform: scale(0.92); }

  .ctrl-btn.play {
    width: 38px; height: 38px;
    background: var(--green);
    color: #000;
    border-radius: 12px;
    font-size: 15px;
  }

  .ctrl-btn.play:hover { background: #00ffaa; }

  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
    transition: transform 0.12s;
  }

  input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.3); }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
  }

  /* ── VIEWS ── */
  .views {
    position: fixed;
    bottom: 22px; left: 18px;
    z-index: 25;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-body);
  }

  .views-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.7); }
  }

  /* ── MOBILE ── */
  @media (max-width: 500px) {
    .card { max-width: 100%; border-radius: 20px; padding: 22px 18px 18px; }
    .name { font-size: 32px; }
    .avatar-wrap { width: 80px; height: 80px; }
    .avatar { width: 80px; height: 80px; }
  }
</style>
</head>
<body>

<video class="bg" autoplay loop muted playsinline>
  <source src="dilsherold.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<div class="page">
  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <img src="axiom.jpg" class="avatar" alt="axiom">
      <div class="status-dot" id="statusDot"></div>
    </div>

    <!-- Name -->
    <div class="name">dilsher</div>
    <div class="subuser">@axiomkrd</div>

    <!-- Badges -->
    <div class="badges">
      <span class="badge">16</span>
      <span class="badge">Sunni</span>
      <span class="badge">Kurdish</span>
    </div>

    <!-- Discord -->
    <div class="discord-box">
      <img id="dcAvatar" src="axiom.jpg" class="dc-avatar" alt="dc">
      <div class="dc-info">
        <div class="dc-name" id="dcName">axiomkrd</div>
        <div class="dc-status" id="dcStatus">Loading…</div>
      </div>
      <svg class="dc-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
    </div>

    <!-- Social links -->
    <div class="links">
      <a class="link-btn" href="https://www.youtube.com/@EnvAxiom" target="_blank" title="YouTube">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
      </a>
      <a class="link-btn" href="https://www.twitch.tv/axiomkrd" target="_blank" title="Twitch">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968819.png" alt="Twitch">
      </a>
      <a class="link-btn" href="https://steamcommunity.com/profiles/76561199501656181/" target="_blank" title="Steam">
        <img src="https://cdn-icons-png.flaticon.com/512/3670/3670382.png" alt="Steam">
      </a>
      <a class="link-btn" href="https://www.snapchat.com/@dilsherderkurde" target="_blank" title="Snapchat">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733614.png" alt="Snapchat">
      </a>
      <a class="link-btn" href="https://www.tiktok.com/@dilsherkrd" target="_blank" title="TikTok">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
      </a>
      <a class="link-btn" href="https://www.roblox.com/users/2046889032/profile" target="_blank" title="Roblox">
        <img src="https://cdn.discordapp.com/attachments/1412234267148161058/1495048977295478915/0eeeb19633422b1241f4306419a0f15f39d58de9.png?ex=69e4d45c&is=69e382dc&hm=89f01665b83d45cdb20aef6b960a8b5640654bb2ced8a72c9ed8c5d79ebacf7b&" alt="Roblox" style="filter:none; opacity:0.9;">
      </a>
    </div>

  </div>
</div>

<!-- Player -->
<div class="player">
  <div class="player-top">
    <div class="album-art" id="albumArt">🎵</div>
    <div class="song-info">
      <div class="song-title" id="songTitle">Loading…</div>
      <div class="song-time"><span id="current">0:00</span> / <span id="duration">0:00</span></div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="ctrl-btn" onclick="prevSong()" title="Prev">⏮</button>
    <button class="ctrl-btn play" id="playBtn" onclick="playPause()" title="Play/Pause">▶</button>
    <button class="ctrl-btn" onclick="nextSong()" title="Next">⏭</button>
    <div class="progress-wrap">
      <input type="range" id="progress" value="0" step="0.1">
      <div class="time-row">
        <span id="current2">0:00</span>
        <span id="duration2">0:00</span>
      </div>
    </div>
  </div>
  <audio id="audio" preload="auto"></audio>
</div>

<!-- Views -->
<div class="views">
  <div class="views-dot"></div>
  <span id="views"></span>
</div>

<script>
// ── VIEWS ──
let v = parseInt(localStorage.getItem('dv') || '0') + 1;
localStorage.setItem('dv', v);
document.getElementById('views').textContent = v.toLocaleString() + ' views';

// ── MUSIC ──
const audio    = document.getElementById('audio');
const progress = document.getElementById('progress');
const playBtn  = document.getElementById('playBtn');

const songs = [
  { file: "I Don't Like (Remix).mp3",        label: "I Don't Like (Remix)" },
  { file: "Roddy Ricch - The Box.mp3",       label: "Roddy Ricch — The Box" },
  { file: "Cartoon, Jéja - On & On.mp3",     label: "Cartoon & Jéja — On & On" },
  { file: "Ey Reqîb.mp3",                    label: "Ey Reqîb" },
];

let idx = 0;

function fmt(t) {
  let m = Math.floor(t / 60), s = Math.floor(t % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function loadSong() {
  const s = songs[idx];
  audio.src = encodeURI(s.file);
  audio.load();
  document.getElementById('songTitle').textContent = s.label;
  document.getElementById('duration').textContent  = '0:00';
  document.getElementById('duration2').textContent = '0:00';
  progress.value = 0;
}

function playPause() {
  if (audio.paused) { audio.play().catch(() => {}); playBtn.textContent = '⏸'; }
  else              { audio.pause();                 playBtn.textContent = '▶'; }
}

function nextSong() { idx = (idx + 1) % songs.length; loadSong(); audio.play(); playBtn.textContent = '⏸'; }
function prevSong() { idx = (idx - 1 + songs.length) % songs.length; loadSong(); audio.play(); playBtn.textContent = '⏸'; }

audio.addEventListener('loadedmetadata', () => {
  const d = fmt(audio.duration);
  document.getElementById('duration').textContent  = d;
  document.getElementById('duration2').textContent = d;
});

audio.ontimeupdate = () => {
  const c = fmt(audio.currentTime);
  document.getElementById('current').textContent  = c;
  document.getElementById('current2').textContent = c;
  if (audio.duration) progress.value = (audio.currentTime / audio.duration) * 100;
};

audio.onended = () => nextSong();

progress.oninput = () => {
  if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
};

document.body.addEventListener('click', () => {
  audio.play().catch(() => {});
  playBtn.textContent = '⏸';
}, { once: true });

loadSong();

// ── DISCORD ──
const UID = "856911460587012116";

const statusColors = {
  online:  '#3ba55d',
  idle:    '#faa61a',
  dnd:     '#ed4245',
  offline: '#747f8d',
};

const statusLabels = {
  online:  '🟢 Online',
  idle:    '🌙 Idle',
  dnd:     '⛔ Do Not Disturb',
  offline: '⚫ Offline',
};

async function updateDiscord() {
  try {
    const res  = await fetch(`https://api.lanyard.rest/v1/users/${UID}`);
    const json = await res.json();
    if (!json.success) return;
    const d = json.data;

    // status dot
    const dot = document.getElementById('statusDot');
    dot.style.background = statusColors[d.discord_status] || '#747f8d';

    // avatar
    if (d.discord_user.avatar) {
      document.getElementById('dcAvatar').src =
        `https://cdn.discordapp.com/avatars/${UID}/${d.discord_user.avatar}.png?size=80`;
    }

    document.getElementById('dcName').textContent = d.discord_user.username;

    const act = d.activities.find(a => a.type !== 4);
    const spotify = d.spotify;

    let statusText = statusLabels[d.discord_status] || 'Offline';

    if (spotify) {
      statusText = `🎵 ${spotify.artist} — ${spotify.song}`;
    } else if (act) {
      statusText = `🎮 ${act.name}` + (act.details ? ` · ${act.details}` : '');
    }

    document.getElementById('dcStatus').textContent = statusText;
  } catch {
    document.getElementById('dcStatus').textContent = 'Could not reach Discord';
  }
}

setInterval(updateDiscord, 5000);
updateDiscord();
</script>
</body>
</html>
