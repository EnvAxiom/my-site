<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dilsher</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background:black;
  overflow:hidden;
}

/* BACKGROUND */
video.bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:blur(6px) brightness(0.5);
}

/* CARD */
.card {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(30,30,30,0.7);
  backdrop-filter:blur(14px);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:420px;
  text-align:center;
}

/* PROFILE */
.avatar {
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #00ff88;
}

.name {
  font-size:32px;
  margin:10px 0;
  background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet);
  background-size:1400% 1400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rgb 8s ease infinite;
}

.subuser {font-size:14px;opacity:0.7;}
.subtitle {font-size:14px;opacity:0.8;}

@keyframes rgb {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

/* DISCORD BOX */
.discord-box {
  margin-top:15px;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.discord-box img {
  width:35px;
  height:35px;
  border-radius:50%;
}

/* LINKS */
.links img {
  width:28px;
  margin:8px;
  cursor:pointer;
  transition:0.2s;
}
.links img:hover {transform:scale(1.2);}

/* PLAYER */
.player {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:500px;
  background:rgba(30,30,30,0.75);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
}

.song-title {font-size:14px;}
.time {font-size:11px;opacity:0.7;}
.controls {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:8px;
}

button {
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

input[type=range] {
  width:100%;
}

/* VIEWS */
.views {
  position:absolute;
  bottom:15px;
  left:20px;
  font-size:20px;
  opacity:0.9;
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width:600px){
  .card {
    padding:20px;
  }
  .avatar {
    width:80px;
    height:80px;
  }
  .name {
    font-size:26px;
  }
}
</style>
</head>

<body>

<video class="bg" autoplay loop muted playsinline>
  <source src="dilsherold.mp4" type="video/mp4">
</video>

<div class="card">
  <img src="axiom.jpg" class="avatar">
  <div class="name">dilsher</div>
  <div class="subuser">axiomkrd</div>
  <div class="subtitle">16 | Sunni | Kurdish</div>

  <div class="discord-box">
    <img id="dcAvatar" src="axiom.jpg">
    <div>
      <div id="dcName">axiomkrd</div>
      <div id="dcStatus" style="font-size:12px;opacity:0.7">Loading...</div>
    </div>
  </div>

  <div class="links">
    <a href="https://www.youtube.com/@EnvAxiom" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    <a href="https://www.twitch.tv/axiomkrd" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968819.png"></a>
    <a href="https://steamcommunity.com/profiles/76561199501656181/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670382.png"></a>
    <a href="https://www.snapchat.com/@dilsherderkurde" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733614.png"></a>
    <a href="https://www.tiktok.com/@dilsherkrd" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
    <a href="https://www.roblox.com/users/2046889032/profile" target="_blank">
      <img src="https://cdn.discordapp.com/attachments/1412234267148161058/1495048977295478915/0eeeb19633422b1241f4306419a0f15f39d58de9.png?ex=69e4d45c&is=69e382dc&hm=89f01665b83d45cdb20aef6b960a8b5640654bb2ced8a72c9ed8c5d79ebacf7b&" style="filter:invert(1)">
    </a>
  </div>
</div>

<div class="player">
  <div class="song-title" id="songTitle"></div>
  <div class="time"><span id="current">0:00</span> — <span id="duration">0:00</span></div>
  <input type="range" id="progress" value="0">

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()">▶</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <audio id="audio" preload="auto"></audio>
</div>

<div class="views" id="views"></div>

<script>
// DEVICE DETECTION
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

if(isMobile){
  console.log("User is on mobile");
  document.body.style.overflow = "auto"; // better scrolling
}

// MUSIC
const audio = document.getElementById('audio');
const progress = document.getElementById('progress');
const title = document.getElementById('songTitle');
const currentTimeEl = document.getElementById('current');
const durationEl = document.getElementById('duration');

const songs = [
  "Ey Reqîb.mp3"
];

let index = 0;

function loadSong(){
  let file = songs[index];
  audio.src = encodeURI(file);
  audio.load();

  title.innerText = file.replace(".mp3","");
}

function playPause(){
  if(audio.paused){audio.play().catch(()=>{});}
  else {audio.pause();}
}

function nextSong(){index=(index+1)%songs.length;loadSong();audio.play();}
function prevSong(){index=(index-1+songs.length)%songs.length;loadSong();audio.play();}

function format(t){
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  if(s<10)s="0"+s;
  return m+":"+s;
}

audio.addEventListener('loadedmetadata', ()=>{
  durationEl.innerText = format(audio.duration);
});

audio.ontimeupdate = ()=>{
  if(audio.duration){
    progress.value = (audio.currentTime/audio.duration)*100;
  }
  currentTimeEl.innerText = format(audio.currentTime);
};

progress.oninput = ()=>{
  audio.currentTime = (progress.value/100)*audio.duration;
};

// mobile autoplay fix
document.body.addEventListener('click', ()=>{
  audio.play().catch(()=>{});
}, {once:true});

loadSong();

// DISCORD
const ID = "856911460587012116";

async function updateDiscord(){
  try{
    let res = await fetch(`https://api.lanyard.rest/v1/users/${ID}`);
    let json = await res.json();

    if(json.success){
      let d = json.data;

      let statusMap = {
        online:"🟢 Online",
        idle:"🌙 Idle",
        dnd:"⛔ DND",
        offline:"⚫ Offline"
      };

      let activity = d.activities.length ? d.activities[0].name : "Doing nothing";

      document.getElementById("dcStatus").innerText =
        activity + " • " + statusMap[d.discord_status];

      document.getElementById("dcAvatar").src =
        `https://cdn.discordapp.com/avatars/${ID}/${d.discord_user.avatar}.png`;

      document.getElementById("dcName").innerText =
        d.discord_user.username;
    }
  }catch{
    document.getElementById("dcStatus").innerText = "offline";
  }
}

setInterval(updateDiscord,5000);
updateDiscord();

// VIEWS
let v = localStorage.getItem('views') || 0;
v++;
localStorage.setItem('views', v);
document.getElementById('views').innerText = "👁 " + v;
</script>

</body>
</html>
