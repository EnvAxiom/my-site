<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dilsher</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00ff88;
  --g2: #00ffcc;
  --g-glow: rgba(0,255,136,0.5);
  --g-dim: rgba(0,255,136,0.08);
  --red: #ff3b5c;
  --blue: #4488ff;
  --bg: #030303;
  --card: rgba(8,8,8,0.85);
  --border: rgba(255,255,255,0.06);
  --text: #f5f5f5;
  --muted: rgba(255,255,255,0.38);
  --mono: 'Space Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --body: 'DM Sans', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  width:100%;height:100%;
  font-family:var(--body);
  color:var(--text);
  background:var(--bg);
  overflow:hidden;
}

/* ── NOISE OVERLAY ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025;
  pointer-events:none;
}

/* ── BG VIDEO ── */
video.bg{
  position:fixed;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:0;
  filter:blur(24px) brightness(0.22) saturate(1.6) hue-rotate(10deg);
  transform:scale(1.08);
}

/* ── VIGNETTE ── */
.vignette{
  position:fixed;inset:0;z-index:2;
  background:radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(0,0,0,0.85) 100%);
  pointer-events:none;
}

/* ── SCAN LINES ── */
.scanlines{
  position:fixed;inset:0;z-index:2;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events:none;
}

/* ── GLOW ORBS ── */
.orb{
  position:fixed;z-index:1;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  animation:orbFloat 8s ease-in-out infinite;
}
.orb1{width:300px;height:300px;background:rgba(0,255,136,0.07);top:-80px;left:-60px;}
.orb2{width:200px;height:200px;background:rgba(68,136,255,0.06);bottom:80px;right:-40px;animation-delay:-3s;}
.orb3{width:150px;height:150px;background:rgba(255,59,92,0.05);bottom:160px;left:30px;animation-delay:-5s;}

@keyframes orbFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-20px) scale(1.05);}
}

/* ── LAYOUT ── */
.page{
  position:fixed;inset:0;z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:16px 16px 130px;
}

/* ── CARD ── */
.card{
  width:100%;max-width:420px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:28px;
  backdrop-filter:blur(40px) saturate(2);
  -webkit-backdrop-filter:blur(40px) saturate(2);
  padding:32px 26px 24px;
  position:relative;
  overflow:hidden;
  animation:cardIn 0.9s cubic-bezier(.16,1,.3,1) both;
}

@keyframes cardIn{
  from{opacity:0;transform:translateY(30px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* card top accent line */
.card::before{
  content:'';
  position:absolute;top:0;left:10%;right:10%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--g),transparent);
  opacity:0.6;
}

/* card inner glow */
.card::after{
  content:'';
  position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:200px;height:120px;
  background:radial-gradient(ellipse,rgba(0,255,136,0.07) 0%,transparent 70%);
  pointer-events:none;
}

/* ── TAG ── */
.tag-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:22px;
}

.tag-left{
  font-family:var(--mono);
  font-size:10px;
  color:var(--g);
  letter-spacing:2px;
  opacity:0.7;
}

.tag-right{
  display:flex;align-items:center;gap:6px;
}

.live-badge{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:1px;
  color:var(--muted);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:100px;
  padding:3px 8px;
}

.live-dot{
  width:5px;height:5px;border-radius:50%;
  background:#888;
  transition:background 0.3s, box-shadow 0.3s;
}

/* ── AVATAR SECTION ── */
.avatar-section{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
}

.avatar-wrap{
  position:relative;
  flex-shrink:0;
}

/* hexagon clip */
.avatar-hex{
  width:80px;height:80px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:linear-gradient(135deg,var(--g),var(--g2),var(--blue));
  padding:2px;
  animation:hexSpin 6s linear infinite;
}

@keyframes hexSpin{
  0%,100%{filter:drop-shadow(0 0 8px var(--g-glow));}
  50%{filter:drop-shadow(0 0 16px var(--g-glow)) drop-shadow(0 0 32px rgba(0,255,204,0.3));}
}

.avatar-hex-inner{
  width:100%;height:100%;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  overflow:hidden;
  background:#000;
}

.avatar-hex-inner img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

.status-indicator{
  position:absolute;
  bottom:-2px;right:-2px;
  width:18px;height:18px;
  border-radius:50%;
  border:2px solid var(--bg);
  background:#555;
  transition:background 0.3s, box-shadow 0.3s;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;
}

.avatar-info{
  flex:1;min-width:0;
}

.name{
  font-family:var(--display);
  font-size:52px;
  line-height:0.95;
  letter-spacing:2px;
  background:linear-gradient(135deg,#fff 0%,var(--g) 40%,var(--g2) 70%,#fff 100%);
  background-size:300% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:nameShine 5s linear infinite;
  margin-bottom:4px;
}

@keyframes nameShine{to{background-position:300% center;}}

.handle{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
  margin-bottom:10px;
}

.pills{
  display:flex;gap:5px;flex-wrap:wrap;
}

.pill{
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:1.5px;
  padding:3px 9px;
  border-radius:100px;
  border:1px solid rgba(0,255,136,0.2);
  background:rgba(0,255,136,0.05);
  color:rgba(0,255,136,0.7);
}

/* ── DIVIDER ── */
.divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  margin:18px 0;
}

/* ── DISCORD BOX ── */
.discord-box{
  width:100%;
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px 15px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
  cursor:default;
  transition:border-color 0.2s,background 0.2s;
}

.discord-box:hover{
  border-color:rgba(88,101,242,0.4);
  background:rgba(88,101,242,0.05);
}

.discord-box::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,#5865f2,#7289da);
  opacity:0.7;
}

.dc-avatar{
  width:36px;height:36px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid rgba(255,255,255,0.1);
  flex-shrink:0;
}

.dc-info{flex:1;min-width:0;}
.dc-name{font-weight:500;font-size:13px;letter-spacing:0.3px;}
.dc-status{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

.dc-badge{
  font-family:var(--mono);
  font-size:8px;
  letter-spacing:1px;
  color:rgba(88,101,242,0.8);
  border:1px solid rgba(88,101,242,0.3);
  border-radius:4px;
  padding:2px 6px;
  flex-shrink:0;
}

/* ── SOCIAL LINKS ── */
.links-label{
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:10px;
}

.links{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
}

.link-btn{
  aspect-ratio:1;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  display:flex;
  align-items:center;justify-content:center;
  text-decoration:none;
  transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}

.link-btn::before{
  content:'';
  position:absolute;inset:0;
  background:var(--hover-color, rgba(255,255,255,0.05));
  opacity:0;
  transition:opacity 0.2s;
  border-radius:inherit;
}

.link-btn:hover{
  transform:translateY(-4px) scale(1.1);
  border-color:var(--hover-border, rgba(255,255,255,0.2));
  box-shadow:0 8px 24px rgba(0,0,0,0.4), 0 0 12px var(--hover-glow, transparent);
}

.link-btn:hover::before{opacity:1;}

.link-btn img{
  width:18px;height:18px;
  object-fit:contain;
  filter:brightness(0) invert(1);
  opacity:0.65;
  position:relative;z-index:1;
  transition:opacity 0.2s,transform 0.2s;
}

.link-btn:hover img{opacity:1;transform:scale(1.1);}

/* platform colors */
.link-btn.yt{--hover-color:rgba(255,0,0,0.1);--hover-border:rgba(255,0,0,0.3);--hover-glow:rgba(255,0,0,0.2);}
.link-btn.tw{--hover-color:rgba(145,70,255,0.1);--hover-border:rgba(145,70,255,0.3);--hover-glow:rgba(145,70,255,0.2);}
.link-btn.st{--hover-color:rgba(23,113,184,0.1);--hover-border:rgba(23,113,184,0.3);--hover-glow:rgba(23,113,184,0.2);}
.link-btn.sc{--hover-color:rgba(255,252,0,0.1);--hover-border:rgba(255,252,0,0.3);--hover-glow:rgba(255,252,0,0.1);}
.link-btn.tk{--hover-color:rgba(0,242,234,0.1);--hover-border:rgba(0,242,234,0.3);--hover-glow:rgba(0,242,234,0.2);}
.link-btn.rb{--hover-color:rgba(226,35,26,0.1);--hover-border:rgba(226,35,26,0.3);--hover-glow:rgba(226,35,26,0.2);}

/* ── PLAYER ── */
.player{
  position:fixed;
  bottom:14px;left:50%;transform:translateX(-50%);
  z-index:20;
  width:calc(100% - 28px);max-width:420px;
  background:rgba(6,6,6,0.92);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:22px;
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  padding:14px 16px 12px;
  animation:cardIn 0.9s 0.15s cubic-bezier(.16,1,.3,1) both;
  overflow:hidden;
}

.player::before{
  content:'';
  position:absolute;top:0;left:20%;right:20%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,0.4),transparent);
}

/* waveform bg */
.player-wave{
  position:absolute;inset:0;
  display:flex;align-items:flex-end;
  gap:2px;
  padding:0 16px 0;
  pointer-events:none;
  opacity:0.06;
}

.wave-bar{
  flex:1;
  background:var(--g);
  border-radius:2px 2px 0 0;
  animation:wavePulse 1.2s ease-in-out infinite;
  transform-origin:bottom;
}

@keyframes wavePulse{
  0%,100%{transform:scaleY(0.3);}
  50%{transform:scaleY(1);}
}

.player-main{
  display:flex;align-items:center;gap:12px;
  margin-bottom:10px;
  position:relative;z-index:1;
}

.album{
  width:42px;height:42px;
  border-radius:10px;
  background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(68,136,255,0.1));
  border:1px solid rgba(0,255,136,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  flex-shrink:0;
  overflow:hidden;
  position:relative;
}

.album.playing::after{
  content:'';
  position:absolute;inset:0;
  background:conic-gradient(var(--g),transparent,var(--g));
  animation:albumSpin 3s linear infinite;
  opacity:0.2;
}

@keyframes albumSpin{to{transform:rotate(360deg);}}

.album img{width:100%;height:100%;object-fit:cover;border-radius:9px;position:relative;z-index:1;}

.song-meta{flex:1;min-width:0;}
.song-title{font-size:12px;font-weight:500;letter-spacing:0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.song-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.5px;}

.ctrl-row{
  display:flex;align-items:center;gap:6px;
  position:relative;z-index:1;
}

.ctrl{
  background:none;border:none;color:var(--text);
  width:32px;height:32px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;
  transition:background 0.15s,transform 0.12s;
  flex-shrink:0;
}

.ctrl:hover{background:rgba(255,255,255,0.07);}
.ctrl:active{transform:scale(0.88);}

.ctrl.play-btn{
  width:36px;height:36px;
  background:var(--g);
  color:#000;
  border-radius:12px;
  font-size:13px;
  font-weight:700;
  box-shadow:0 0 16px rgba(0,255,136,0.3);
  transition:all 0.15s;
}

.ctrl.play-btn:hover{background:#00ffaa;box-shadow:0 0 24px rgba(0,255,136,0.5);}

.progress-col{
  flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;
}

input[type=range]{
  -webkit-appearance:none;
  width:100%;height:2px;
  border-radius:2px;
  background:rgba(255,255,255,0.1);
  outline:none;cursor:pointer;
}

input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--g);
  cursor:pointer;
  box-shadow:0 0 6px var(--g-glow);
  transition:transform 0.12s;
}

input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.4);}

.time-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);}

/* ── VIEWS ── */
.views{
  position:fixed;
  bottom:20px;left:16px;
  z-index:25;
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
  display:flex;align-items:center;gap:6px;
  letter-spacing:0.5px;
}

.vdot{
  width:6px;height:6px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 8px var(--g-glow);
  animation:vPulse 2s ease-in-out infinite;
}

@keyframes vPulse{
  0%,100%{opacity:1;box-shadow:0 0 8px var(--g-glow);}
  50%{opacity:0.4;box-shadow:0 0 3px var(--g-glow);}
}

/* ── CORNER DECOR ── */
.corner{
  position:absolute;
  width:20px;height:20px;
  opacity:0.3;
}

.corner.tl{top:16px;left:16px;border-top:1px solid var(--g);border-left:1px solid var(--g);}
.corner.tr{top:16px;right:16px;border-top:1px solid var(--g);border-right:1px solid var(--g);}
.corner.bl{bottom:16px;left:16px;border-bottom:1px solid var(--g);border-left:1px solid var(--g);}
.corner.br{bottom:16px;right:16px;border-bottom:1px solid var(--g);border-right:1px solid var(--g);}

/* ── MOBILE ── */
@media(max-width:500px){
  .card{max-width:100%;border-radius:22px;padding:24px 18px 20px;}
  .name{font-size:44px;}
  .avatar-hex{width:70px;height:70px;}
  .avatar-hex-inner img{width:70px;height:70px;}
}
</style>
</head>
<body>

<video class="bg" autoplay loop muted playsinline>
  <source src="dilsherold.mp4" type="video/mp4">
</video>
<div class="vignette"></div>

<div class="orb orb3"></div>

<div class="page">
  <div class="card">

    <!-- Social links -->
    <div class="links-label">FIND ME ON</div>

      </a>

      </a>

      <a class="link-btn sc" href="https://www.snapchat.com/@dilsherderkurde" target="_blank" title="Snapchat">

        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
      </a>
      <a class="link-btn rb" href="https://www.roblox.com/users/2046889032/profile" target="_blank" title="Roblox">
        <img src="https://cdn.discordapp.com/attachments/1412234267148161058/1495048977295478915/0eeeb19633422b1241f4306419a0f15f39d58de9.png?ex=69e4d45c&is=69e382dc&hm=89f01665b83d45cdb20aef6b960a8b5640654bb2ced8a72c9ed8c5d79ebacf7b&" alt="Roblox" style="filter:none;opacity:0.85;">
      </a>
    </div>
  </div>
</div>

<!-- Player -->
<div class="player" id="player">
  <!-- animated wave bg -->
  <div class="player-wave" id="waveViz"></div>

  <div class="player-main">
    <div class="album" id="albumArt">🎵</div>
    <div class="song-meta">
      <div class="song-title" id="songTitle">Loading…</div>
      <div class="song-sub"><span id="curTime">0:00</span> · <span id="durTime">0:00</span></div>
    </div>
  </div>

  <div class="ctrl-row">
    <button class="ctrl" onclick="prevSong()" title="Prev">⏮</button>
    <button class="ctrl play-btn" id="playBtn" onclick="playPause()">▶</button>
    <button class="ctrl" onclick="nextSong()" title="Next">⏭</button>
    <div class="progress-col">
      <input type="range" id="progressBar" value="0" step="0.1">
      <div class="time-row">
        <span id="curTime2">0:00</span>
        <span id="durTime2">0:00</span>
      </div>
    </div>
  </div>
  <audio id="audio" preload="auto"></audio>
</div>

<!-- Views -->
<div class="views">
  <div class="vdot"></div>
  <span id="viewCount"></span>
</div>

<script>
// ── WAVE VIZ ──
const waveEl = document.getElementById('waveViz');
for(let i=0;i<32;i++){
  const b=document.createElement('div');
  b.className='wave-bar';
  b.style.height=(Math.random()*60+20)+'%';
  b.style.animationDelay=(Math.random()*1.2)+'s';
  b.style.animationDuration=(0.8+Math.random()*0.8)+'s';
  waveEl.appendChild(b);
}

// ── VIEWS ──
let v=parseInt(localStorage.getItem('dv_v3')||'0')+1;
localStorage.setItem('dv_v3',v);
document.getElementById('viewCount').textContent=v.toLocaleString()+' views';

// ── MUSIC ──
const audio=document.getElementById('audio');
const prog=document.getElementById('progressBar');
const playBtn=document.getElementById('playBtn');
const albumArt=document.getElementById('albumArt');

const songs=[
  {file:"I Don't Like (Remix).mp3",label:"I Don't Like (Remix)"},
  {file:"Roddy Ricch - The Box.mp3",label:"Roddy Ricch — The Box"},
  {file:"Cartoon, Jéja - On & On.mp3",label:"Cartoon & Jéja — On & On"},
  {file:"Ey Reqîb.mp3",label:"Ey Reqîb"},
];

let idx=0;
const fmt=t=>{let m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s;};

function loadSong(){
  const s=songs[idx];
  audio.src=encodeURI(s.file);audio.load();
  document.getElementById('songTitle').textContent=s.label;
  ['durTime','durTime2'].forEach(id=>document.getElementById(id).textContent='0:00');
  prog.value=0;
}

function playPause(){
  if(audio.paused){audio.play().catch(()=>{});playBtn.textContent='⏸';albumArt.classList.add('playing');}
  else{audio.pause();playBtn.textContent='▶';albumArt.classList.remove('playing');}
}

function nextSong(){idx=(idx+1)%songs.length;loadSong();audio.play();playBtn.textContent='⏸';albumArt.classList.add('playing');}
function prevSong(){idx=(idx-1+songs.length)%songs.length;loadSong();audio.play();playBtn.textContent='⏸';albumArt.classList.add('playing');}

audio.addEventListener('loadedmetadata',()=>{
  const d=fmt(audio.duration);
  ['durTime','durTime2'].forEach(id=>document.getElementById(id).textContent=d);
});

audio.ontimeupdate=()=>{
  const c=fmt(audio.currentTime);
  ['curTime','curTime2'].forEach(id=>document.getElementById(id).textContent=c);
  if(audio.duration)prog.value=(audio.currentTime/audio.duration)*100;
};

audio.onended=()=>nextSong();

prog.oninput=()=>{
  if(audio.duration)audio.currentTime=(prog.value/100)*audio.duration;
};

document.body.addEventListener('click',()=>{
  audio.play().catch(()=>{});playBtn.textContent='⏸';albumArt.classList.add('playing');
},{once:true});

loadSong();

// ── DISCORD / LANYARD ──
const UID="856911460587012116";
const statusColors={online:'#3ba55d',idle:'#faa61a',dnd:'#ed4245',offline:'#747f8d'};
const statusEmoji={online:'🟢 ONLINE',idle:'🌙 IDLE',dnd:'⛔ DND',offline:'⚫ OFFLINE'};

async function updateDiscord(){
  try{
    const res=await fetch(`https://api.lanyard.rest/v1/users/${UID}`);
    const json=await res.json();
    if(!json.success)return;
    const d=json.data;

    // status dot on avatar
    const dot=document.getElementById('statusDot');
    dot.style.background=statusColors[d.discord_status]||'#747f8d';
    dot.style.boxShadow=`0 0 8px ${statusColors[d.discord_status]||'#747f8d'}`;

    // live badge
    const liveDot=document.getElementById('liveDot');
    const liveText=document.getElementById('liveText');
    liveDot.style.background=statusColors[d.discord_status]||'#747f8d';
    liveText.textContent=statusEmoji[d.discord_status]||'OFFLINE';

    if(d.discord_user.avatar){
      document.getElementById('dcAvatar').src=`https://cdn.discordapp.com/avatars/${UID}/${d.discord_user.avatar}.png?size=80`;
    }
    document.getElementById('dcName').textContent=d.discord_user.username;

    const act=d.activities.find(a=>a.type!==4);
    const sp=d.spotify;
    let st='';
    if(sp){st=`🎵 ${sp.artist} — ${sp.song}`;}
    else if(act){st=`🎮 ${act.name}`+(act.details?` · ${act.details}`:'');}
    else{st=statusEmoji[d.discord_status]||'Offline';}
    document.getElementById('dcStatus').textContent=st;
  }catch(e){
    document.getElementById('dcStatus').textContent='Could not reach Discord';
  }
}

setInterval(updateDiscord,5000);
updateDiscord();
</script>
</body>
</html>
