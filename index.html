<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dilsher</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --g:#4cff82;
  --bg:#0a0a0a;
  --card:rgba(22,22,22,0.82);
  --text:#f0f0f0;
  --muted:rgba(255,255,255,0.42);
}

html,body{
  width:100%;height:100%;
  font-family:'Nunito',sans-serif;
  color:var(--text);
  background:var(--bg);
  overflow:hidden;
}

/* BG */
video.bg{
  position:fixed;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  filter:blur(18px) brightness(0.3);
}

/* PAGE */
.page{
  position:fixed;inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding-bottom:120px;
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  background:var(--card);
  border-radius:20px;
  padding:25px;
  backdrop-filter:blur(30px);
}

/* NAME */
.name{
  text-align:center;
  font-size:30px;
  font-weight:900;
  color:var(--g);
}

.subtitle{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 20px);
  max-width:520px;

  background:rgba(18,18,18,0.9);
  border-radius:18px;
  padding:12px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

/* TOP ROW */
.player-top{
  display:flex;
  gap:10px;
  align-items:center;
}

.album-art{
  width:44px;height:44px;
  border-radius:10px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}

.player-mid{
  flex:1;
}

.song-title{
  font-size:13px;
  margin-bottom:5px;
}

/* PROGRESS */
.time-progress{
  display:flex;
  align-items:center;
  gap:6px;
}

.time-label{
  font-size:10px;
  color:var(--muted);
}

/* RANGE */
input[type=range]{
  flex:1;
  height:3px;
}

/* BOTTOM */
.player-bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* CONTROLS */
.ctrl{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  margin:0 3px;
  cursor:pointer;
}

.volume{
  width:90px;
}

/* MOBILE */
@media (max-width:480px){
  .volume{width:70px;}
}
</style>
</head>

<body>

<video class="bg" autoplay loop muted playsinline>
  <source src="dilsherold.mp4" type="video/mp4">
</video>

<div class="page">
  <div class="card">
    <div class="name">dilsher</div>
    <div class="subtitle">16 | Sunni | Kurdish</div>
  </div>
</div>

<!-- PLAYER -->
<div class="player">

  <div class="player-top">
    <div class="album-art">🎵</div>

    <div class="player-mid">
      <div class="song-title" id="songTitle">Loading…</div>

      <div class="time-progress">
        <span class="time-label" id="curTime">0:00</span>
        <input type="range" id="progressBar" value="0">
        <span class="time-label" id="durTime">0:00</span>
      </div>
    </div>
  </div>

  <div class="player-bottom">
    <div>
      <button class="ctrl" onclick="prevSong()">⏮</button>
      <button class="ctrl" id="playBtn" onclick="playPause()">▶</button>
      <button class="ctrl" onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="volumeBar" class="volume" min="0" max="1" step="0.01">
  </div>

  <audio id="audio"></audio>
</div>

<script>
const audio = document.getElementById('audio');
const prog = document.getElementById('progressBar');
const playBtn = document.getElementById('playBtn');
const volumeBar = document.getElementById('volumeBar');

const songs = [
  { file:"I Don't Like (Remix).mp3", label:"I Don't Like (Remix)" },
  { file:"Roddy Ricch - The Box.mp3", label:"Roddy Ricch — The Box" },
  { file:"Cartoon, Jéja - On & On.mp3", label:"Cartoon & Jéja — On & On" }
];

let idx = 0;

function fmt(t){
  let m=Math.floor(t/60),s=Math.floor(t%60);
  return m+':'+(s<10?'0':'')+s;
}

function loadSong(){
  const s=songs[idx];
  audio.src=encodeURI(s.file);
  document.getElementById('songTitle').textContent=s.label;
}

function playPause(){
  if(audio.paused){
    audio.play();
    playBtn.textContent='⏸';
  }else{
    audio.pause();
    playBtn.textContent='▶';
  }
}

function nextSong(){
  idx=(idx+1)%songs.length;
  loadSong();
  audio.play();
  playBtn.textContent='⏸';
}

function prevSong(){
  idx=(idx-1+songs.length)%songs.length;
  loadSong();
  audio.play();
  playBtn.textContent='⏸';
}

audio.ontimeupdate=()=>{
  document.getElementById('curTime').textContent=fmt(audio.currentTime);
  if(audio.duration){
    prog.value=(audio.currentTime/audio.duration)*100;
    document.getElementById('durTime').textContent=fmt(audio.duration);
  }
};

prog.oninput=()=>{
  if(audio.duration){
    audio.currentTime=(prog.value/100)*audio.duration;
  }
};

/* VOLUME */
audio.volume=0.7;
volumeBar.value=0.7;

volumeBar.oninput=()=>{
  audio.volume=volumeBar.value;
};

/* autoplay on first tap (mobile fix) */
document.body.addEventListener('click',()=>{
  audio.play().catch(()=>{});
  playBtn.textContent='⏸';
},{once:true});

loadSong();
</script>

</body>
</html>
