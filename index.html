<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dilsher</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --g: #4cff82;
  --bg: #0a0a0a;
  --card: rgba(22,22,22,0.82);
  --card2: rgba(14,14,14,0.75);
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: rgba(255,255,255,0.42);
  --dc: #5865f2;
}

html,body{
  width:100%;height:100%;
  font-family:'Nunito',sans-serif;
  color:var(--text);
  background:var(--bg);
  overflow:hidden;
}

/* BG VIDEO */
video.bg{
  position:fixed;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:0;
  filter:blur(18px) brightness(0.28) saturate(1.3);
  transform:scale(1.06);
}

/* OVERLAY */
.overlay{
  position:fixed;inset:0;z-index:1;
  background:rgba(0,0,0,0.35);
  pointer-events:none;
}

/* PAGE LAYOUT */
.page{
  position:fixed;inset:0;z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px 16px 110px;
}

/* MAIN CARD */
.card{
  width:100%;max-width:460px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:24px;
  backdrop-filter:blur(32px) saturate(1.8);
  -webkit-backdrop-filter:blur(32px) saturate(1.8);
  padding:28px 24px 22px;
  animation:fadeUp 0.7s cubic-bezier(.16,1,.3,1) both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

/* AVATAR */
.avatar-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:14px;
}

.avatar-ring{
  width:96px;height:96px;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(76,255,130,0.3),rgba(100,160,255,0.2));
  padding:2px;
  position:relative;
}

.avatar-img{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;
  display:block;
  border:2px solid rgba(0,0,0,0.4);
}

/* STATUS DOT on avatar */
.status-dot{
  position:absolute;
  bottom:4px;right:4px;
  width:16px;height:16px;
  border-radius:50%;
  background:#747f8d;
  border:2.5px solid rgba(20,20,20,0.9);
  transition:background 0.3s;
}

/* NAME */
.name{
  font-family:'Nunito',sans-serif;
  font-size:32px;
  font-weight:900;
  color:var(--g);
  text-align:center;
  letter-spacing:1px;
  margin-bottom:5px;
  text-shadow:0 0 20px rgba(76,255,130,0.25);
}

/* SUBTITLE */
.subtitle{
  font-family:'Nunito',sans-serif;
  font-size:13px;
  font-weight:600;
  color:var(--muted);
  text-align:center;
  letter-spacing:0.5px;
  margin-bottom:20px;
}

/* DIVIDER */
.divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);
  margin:18px 0;
}

/* DISCORD BOX */
.discord-box{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
  cursor:default;
  transition:border-color 0.2s, background 0.2s;
}

.discord-box:hover{
  border-color:rgba(88,101,242,0.35);
  background:rgba(88,101,242,0.04);
}

/* left accent */
.discord-box::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,#5865f2,#7289da);
  opacity:0.8;
}

.dc-avatar{
  width:38px;height:38px;
  border-radius:50%;
  object-fit:cover;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,0.1);
}

.dc-info{flex:1;min-width:0;}
.dc-name{
  font-size:13px;
  font-weight:700;
  letter-spacing:0.2px;
  margin-bottom:2px;
}
.dc-status{
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* SOCIAL LINKS */
.links-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.link-btn{
  width:46px;height:46px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;justify-content:center;
  text-decoration:none;
  transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}

.link-btn::before{
  content:'';
  position:absolute;inset:0;
  background:var(--hc,rgba(255,255,255,0.06));
  opacity:0;
  transition:opacity 0.2s;
  border-radius:inherit;
}

.link-btn:hover{
  transform:translateY(-4px) scale(1.08);
  border-color:var(--hb,rgba(255,255,255,0.18));
  box-shadow:0 6px 20px rgba(0,0,0,0.4), 0 0 10px var(--hg,transparent);
}
.link-btn:hover::before{opacity:1;}

.link-btn img{
  width:20px;height:20px;
  object-fit:contain;
  filter:brightness(0) invert(1);
  opacity:0.7;
  position:relative;z-index:1;
  transition:opacity 0.2s, transform 0.2s;
}
.link-btn:hover img{opacity:1;transform:scale(1.1);}

.link-btn.yt{--hc:rgba(255,0,0,0.1);--hb:rgba(255,0,0,0.3);--hg:rgba(255,0,0,0.2);}
.link-btn.tw{--hc:rgba(145,70,255,0.1);--hb:rgba(145,70,255,0.3);--hg:rgba(145,70,255,0.2);}
.link-btn.st{--hc:rgba(23,113,184,0.1);--hb:rgba(23,113,184,0.3);--hg:rgba(23,113,184,0.2);}
.link-btn.sc{--hc:rgba(255,252,0,0.08);--hb:rgba(255,252,0,0.25);--hg:rgba(255,252,0,0.1);}
.link-btn.tk{--hc:rgba(0,242,234,0.1);--hb:rgba(0,242,234,0.3);--hg:rgba(0,242,234,0.2);}
.link-btn.rb{--hc:rgba(226,35,26,0.1);--hb:rgba(226,35,26,0.3);--hg:rgba(226,35,26,0.2);}

/* VIEWS — bottom left */
.views{
  position:fixed;
  bottom:22px;left:18px;
  z-index:25;
  display:flex;align-items:center;gap:6px;
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:rgba(255,255,255,0.45);
  letter-spacing:0.5px;
}

.views svg{
  width:14px;height:14px;
  opacity:0.5;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:10px;
  left:50%;transform:translateX(-50%);
  z-index:20;
  width:calc(100% - 28px);max-width:460px;
  background:rgba(18,18,18,0.9);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  padding:12px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  animation:fadeUp 0.7s 0.1s cubic-bezier(.16,1,.3,1) both;
}

/* album art box */
.album-art{
  width:44px;height:44px;
  border-radius:10px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  flex-shrink:0;
  overflow:hidden;
  position:relative;
}

.album-art.playing::after{
  content:'';
  position:absolute;inset:0;
  border-radius:inherit;
  background:conic-gradient(rgba(76,255,130,0.3),transparent,rgba(76,255,130,0.3));
  animation:spin 3s linear infinite;
  opacity:0.6;
}

@keyframes spin{to{transform:rotate(360deg);}}

.album-art img{width:100%;height:100%;object-fit:cover;border-radius:9px;position:relative;z-index:1;}

/* song info + progress */
.player-mid{
  flex:1;min-width:0;
}

.song-title{
  font-size:12px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:4px;
  letter-spacing:0.2px;
}

.time-progress{
  display:flex;align-items:center;gap:7px;
}

.time-label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  flex-shrink:0;
}

input[type=range]{
  flex:1;
  -webkit-appearance:none;
  height:3px;
  border-radius:3px;
  background:rgba(255,255,255,0.14);
  outline:none;cursor:pointer;
}

input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:11px;height:11px;
  border-radius:50%;
  background:var(--text);
  cursor:pointer;
  box-shadow:0 0 4px rgba(0,0,0,0.5);
  transition:transform 0.12s;
}

input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.35);}

/* player controls */
.ctrl-group{
  display:flex;align-items:center;gap:4px;
  flex-shrink:0;
}

.ctrl{
  background:none;border:none;
  color:rgba(255,255,255,0.65);
  width:30px;height:30px;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:14px;
  transition:background 0.15s, color 0.15s, transform 0.1s;
}

.ctrl:hover{background:rgba(255,255,255,0.08);color:#fff;}
.ctrl:active{transform:scale(0.85);}

.ctrl.play{
  width:32px;height:32px;
  font-size:15px;
  color:rgba(255,255,255,0.85);
}

audio{display:none;}
</style>
</head>
<body>

<!-- Background video -->
<video class="bg" autoplay loop muted playsinline>
  <source src="dilsherold.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Main page -->
<div class="page">
  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <img class="avatar-img" src="axiom.jpg" id="mainAvatar" alt="dilsher">
        <div class="status-dot" id="statusDot"></div>
      </div>
    </div>

    <!-- Name -->
    <div class="name">dilsher</div>
    <div class="subtitle">16 | Sunni | Kurdish</div>

    <!-- Discord box -->
    <div class="discord-box">
      <img class="dc-avatar" id="dcAvatar" src="axiom.jpg" alt="discord">
      <div class="dc-info">
        <div class="dc-name" id="dcName">axiomkrd</div>
        <div class="dc-status" id="dcStatus">Loading…</div>
      </div>
    </div>

    <!-- Social links -->
    <div class="links-wrap">
      <a class="link-btn yt" href="https://www.youtube.com/@EnvAxiom" target="_blank" title="YouTube">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
      </a>
      <a class="link-btn tw" href="https://www.twitch.tv/axiomkrd" target="_blank" title="Twitch">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968819.png" alt="Twitch">
      </a>
      <a class="link-btn st" href="https://steamcommunity.com/profiles/76561199501656181/" target="_blank" title="Steam">
        <img src="https://cdn-icons-png.flaticon.com/512/3670/3670382.png" alt="Steam">
      </a>
      <a class="link-btn sc" href="https://www.snapchat.com/@dilsherderkurde" target="_blank" title="Snapchat">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733614.png" alt="Snapchat">
      </a>
      <a class="link-btn tk" href="https://www.tiktok.com/@dilsherkrd" target="_blank" title="TikTok">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
      </a>
      <a class="link-btn rb" href="https://www.roblox.com/users/2046889032/profile" target="_blank" title="Roblox">
        <img src="https://cdn.discordapp.com/attachments/1412234267148161058/1495048977295478915/0eeeb19633422b1241f4306419a0f15f39d58de9.png?ex=69e4d45c&is=69e382dc&hm=89f01665b83d45cdb20aef6b960a8b5640654bb2ced8a72c9ed8c5d79ebacf7b&" alt="Roblox" style="filter:none;opacity:0.8;">
      </a>
    </div>

  </div>
</div>

<!-- Views -->
<div class="views">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
  <span id="viewCount">0 views</span>
</div>

<!-- Music Player -->
<div class="player">
  <div class="album-art" id="albumArt">🎵</div>

  <div class="player-mid">
    <div class="song-title" id="songTitle">Loading…</div>
    <div class="time-progress">
      <span class="time-label" id="curTime">0:00</span>
      <input type="range" id="progressBar" value="0" step="0.1">
      <span class="time-label" id="durTime">0:00</span>
    </div>
  </div>

  <div class="ctrl-group">
    <button class="ctrl" onclick="prevSong()" title="Previous">⏮</button>
    <button class="ctrl play" id="playBtn" onclick="playPause()">⏸</button>
    <button class="ctrl" onclick="nextSong()" title="Next">⏭</button>
  </div>

  <audio id="audio" preload="auto"></audio>
</div>

<script>
// ── VIEWS ──
let v = parseInt(localStorage.getItem('dv_v3') || '0') + 1;
localStorage.setItem('dv_v3', v);
document.getElementById('viewCount').textContent = v.toLocaleString() + ' views';

// ── MUSIC ──
const audio = document.getElementById('audio');
const prog = document.getElementById('progressBar');
const playBtn = document.getElementById('playBtn');
const albumArt = document.getElementById('albumArt');

const songs = [
  { file: "I Don't Like (Remix).mp3", label: "I Don't Like (Remix)" },
  { file: "Roddy Ricch - The Box.mp3", label: "Roddy Ricch — The Box" },
  { file: "Cartoon, Jéja - On & On.mp3", label: "Cartoon & Jéja — On & On" },
  { file: "Ey Reqîb.mp3", label: "Ey Reqîb" },
];

let idx = 0;
const fmt = t => {
  let m = Math.floor(t / 60), s = Math.floor(t % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
};

function loadSong() {
  const s = songs[idx];
  audio.src = encodeURI(s.file);
  audio.load();
  document.getElementById('songTitle').textContent = s.label;
  document.getElementById('durTime').textContent = '0:00';
  prog.value = 0;
}

function playPause() {
  if (audio.paused) {
    audio.play().catch(() => {});
    playBtn.textContent = '⏸';
    albumArt.classList.add('playing');
  } else {
    audio.pause();
    playBtn.textContent = '▶';
    albumArt.classList.remove('playing');
  }
}

function nextSong() {
  idx = (idx + 1) % songs.length;
  loadSong();
  audio.play().catch(() => {});
  playBtn.textContent = '⏸';
  albumArt.classList.add('playing');
}

function prevSong() {
  idx = (idx - 1 + songs.length) % songs.length;
  loadSong();
  audio.play().catch(() => {});
  playBtn.textContent = '⏸';
  albumArt.classList.add('playing');
}

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('durTime').textContent = fmt(audio.duration);
});

audio.ontimeupdate = () => {
  document.getElementById('curTime').textContent = fmt(audio.currentTime);
  if (audio.duration) prog.value = (audio.currentTime / audio.duration) * 100;
};

audio.onended = () => nextSong();

prog.oninput = () => {
  if (audio.duration) audio.currentTime = (prog.value / 100) * audio.duration;
};

// Auto-play on first click
document.body.addEventListener('click', () => {
  audio.play().catch(() => {});
  playBtn.textContent = '⏸';
  albumArt.classList.add('playing');
}, { once: true });

loadSong();

// ── DISCORD (Lanyard) ──
const UID = "856911460587012116";
const statusColors = { online: '#3ba55d', idle: '#faa61a', dnd: '#ed4245', offline: '#747f8d' };

async function updateDiscord() {
  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${UID}`);
    const json = await res.json();
    if (!json.success) return;
    const d = json.data;

    // Status dot color
    const dot = document.getElementById('statusDot');
    dot.style.background = statusColors[d.discord_status] || '#747f8d';
    dot.style.boxShadow = `0 0 6px ${statusColors[d.discord_status] || '#747f8d'}`;

    // Avatar
    if (d.discord_user.avatar) {
      const avatarUrl = `https://cdn.discordapp.com/avatars/${UID}/${d.discord_user.avatar}.png?size=128`;
      document.getElementById('dcAvatar').src = avatarUrl;
    }

    document.getElementById('dcName').textContent = d.discord_user.username;

    // Status text
    const act = d.activities.find(a => a.type !== 4);
    const sp = d.spotify;
    let st = '';
    if (sp) {
      st = `🎵 ${sp.artist} — ${sp.song}`;
    } else if (act) {
      st = `🎮 ${act.name}` + (act.details ? ` · ${act.details}` : '');
    } else {
      const custom = d.activities.find(a => a.type === 4);
      st = custom?.state || (d.discord_status === 'offline' ? 'currently offline' : 'currently doing nothing');
    }
    document.getElementById('dcStatus').textContent = st;

  } catch (e) {
    document.getElementById('dcStatus').textContent = 'could not reach discord';
  }
}

updateDiscord();
setInterval(updateDiscord, 5000);
</script>
</body>
</html>
