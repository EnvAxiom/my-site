<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dilsher</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --g:#4cff82;
  --bg:#0a0a0a;
  --card:rgba(22,22,22,0.82);
  --text:#f0f0f0;
  --muted:rgba(255,255,255,0.45);
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* BG */
video.bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(18px) brightness(0.3);
}

/* PAGE CENTER */
.page{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding-bottom:120px;
}

/* CARD */
.card{
  background:var(--card);
  padding:28px 32px;
  border-radius:20px;
  backdrop-filter:blur(30px);
  text-align:center;
}

.name{
  font-size:32px;
  font-weight:900;
  color:var(--g);
}

.subtitle{
  font-size:13px;
  color:var(--muted);
}

/* PLAYER */
.player{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 20px);
  max-width:460px;

  background:rgba(18,18,18,0.95);
  border-radius:18px;
  padding:12px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

/* TOP */
.player-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.album{
  width:44px;
  height:44px;
  border-radius:10px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}

.info{
  flex:1;
}

.song{
  font-size:13px;
  margin-bottom:4px;
}

/* PROGRESS */
.progress-wrap{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--muted);
}

input[type=range]{
  flex:1;
}

/* BOTTOM */
.player-bottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.volume{
  width:90px;
}

@media(max-width:480px){
  .volume{width:65px;}
}
</style>
</head>

<body>

<video class="bg" autoplay loop muted playsinline>
  <source src="dilsherold.mp4" type="video/mp4">
</video>

<div class="page">
  <div class="card">
    <div class="name">dilsher</div>
    <div class="subtitle">16 | Sunni | Kurdish</div>
  </div>
</div>

<!-- PLAYER -->
<div class="player">

  <div class="player-top">
    <div class="album">🎵</div>

    <div class="info">
      <div class="song" id="songTitle">Loading…</div>

      <div class="progress-wrap">
        <span id="curTime">0:00</span>
        <input type="range" id="progressBar" value="0">
        <span id="durTime">0:00</span>
      </div>
    </div>
  </div>

  <div class="player-bottom">
    <div>
      <button onclick="prevSong()">⏮</button>
      <button onclick="playPause()" id="playBtn">▶</button>
      <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="volumeBar" class="volume" min="0" max="1" step="0.01">
  </div>

  <audio id="audio"></audio>
</div>

<script>
const audio=document.getElementById('audio');
const progress=document.getElementById('progressBar');
const playBtn=document.getElementById('playBtn');
const volume=document.getElementById('volumeBar');

const songs=[
 {file:"I Don't Like (Remix).mp3",label:"I Don't Like (Remix)"},
 {file:"Roddy Ricch - The Box.mp3",label:"Roddy Ricch — The Box"},
 {file:"Cartoon, Jéja - On & On.mp3",label:"Cartoon & Jéja — On & On"},
 {file:"Ey Reqîb.mp3",label:"Ey Reqîb"}
];

let i=0;

function fmt(t){
 let m=Math.floor(t/60),s=Math.floor(t%60);
 return m+':'+(s<10?'0':'')+s;
}

function load(){
 audio.src=encodeURI(songs[i].file);
 document.getElementById('songTitle').textContent=songs[i].label;
}
load();

function playPause(){
 if(audio.paused){
  audio.play().catch(()=>{});
  playBtn.textContent="⏸";
 }else{
  audio.pause();
  playBtn.textContent="▶";
 }
}

function nextSong(){
 i=(i+1)%songs.length;
 load();
 audio.play().catch(()=>{});
 playBtn.textContent="⏸";
}

function prevSong(){
 i=(i-1+songs.length)%songs.length;
 load();
 audio.play().catch(()=>{});
 playBtn.textContent="⏸";
}

/* FIXED TIME */
audio.addEventListener('loadedmetadata',()=>{
 document.getElementById('durTime').textContent=fmt(audio.duration||0);
});

audio.ontimeupdate=()=>{
 document.getElementById('curTime').textContent=fmt(audio.currentTime||0);
 if(audio.duration){
  progress.value=(audio.currentTime/audio.duration)*100;
 }
};

progress.oninput=()=>{
 if(audio.duration){
  audio.currentTime=(progress.value/100)*audio.duration;
 }
};

audio.onended=nextSong;

/* VOLUME */
audio.volume=0.7;
volume.value=0.7;
volume.oninput=()=>audio.volume=volume.value;

/* MOBILE FIX */
document.body.addEventListener('click',()=>{
 audio.play().catch(()=>{});
 playBtn.textContent="⏸";
},{once:true});
</script>

</body>
</html>
