<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dilsher</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet">
</head>

<body>

<video class="bg" autoplay loop muted playsinline>
  <source src="dilsherold.mp4" type="video/mp4">
</video>

<div class="page">
  <div class="card">
    <div class="name">dilsher</div>
    <div class="subtitle">16 | Sunni | Kurdish</div>
  </div>
</div>

<div class="player">

  <div class="player-top">
    <div class="album">🎵</div>

    <div class="info">
      <div id="songTitle">Loading...</div>

      <div class="progress-wrap">
        <span id="curTime">0:00</span>
        <input type="range" id="progressBar">
        <span id="durTime">0:00</span>
      </div>
    </div>
  </div>

  <div class="player-bottom">
    <div>
      <button onclick="prevSong()">⏮</button>
      <button id="playBtn" onclick="playPause()">▶</button>
      <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="volumeBar" min="0" max="1" step="0.01">
  </div>

  <audio id="audio"></audio>
</div>

<script src="script.js"></script>
</body>
</html>
